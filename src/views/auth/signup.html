<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../../../css/base.css">
</head>
<body class="auth-body">

    <span class="auth-breadcrumb">회원가입</span>

    <main class="auth-wrap">
        <div class="auth-card">

            <a href="#" class="auth-logo">
                <img src="../../images/monzo.png" alt="로고">
            </a>

            <h1 class="auth-title">회원가입</h1>

            <div class="auth-google-section">
                <button class="auth-btn auth-btn--google">
                    <img src="../../images/ico-google.svg" alt="Google" class="auth-btn-ico">
                    <span>구글로 시작하기</span>
                </button>
                <p class="auth-info">
                    <img src="../../images/alert-ico-notice-small.svg" alt="" class="auth-info-ico">
                    유튜브 멤버십 회원은 구글로 시작하셔야 혜택을 받으실 수 있습니다.
                </p>
            </div>

            <div class="auth-social-list">
                <button class="auth-btn auth-btn--kakao">
                    <img src="../../images/ico_kakao.svg" alt="카카오" class="auth-btn-ico">
                    <span>카카오톡으로 시작하기</span>
                </button>
                <button class="auth-btn auth-btn--naver">
                    <img src="../../images/ico-naver.svg" alt="네이버" class="auth-btn-ico">
                    <span>네이버로 시작하기</span>
                </button>
                <button class="auth-btn auth-btn--apple">
                    <img src="../../images/ico-apple.svg" alt="애플" class="auth-btn-ico">
                    <span>애플로 시작하기</span>
                </button>
                <button class="auth-btn auth-btn--facebook">
                    <img src="../../images/ico-fb.svg" alt="페이스북" class="auth-btn-ico">
                    <span>페이스북으로 시작하기</span>
                </button>
            </div>

        </div>
    </main>

</body>
</html>
