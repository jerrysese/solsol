<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../../favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../../favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="../../../favicon/apple-touch-icon.png">
    <title>수료증 - 한글 세로형 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../../css/base.css">
</head>
<body>

    <div class="cert-stage">
        <div class="cert-v2">

            <img class="cert-v2-watermark" src="../../../images/bg_img.png" alt="">

            <div class="cert-v2-no">No. 2026-LMS-0001</div>

            <h1 class="cert-v2-title">수 료 증</h1>

            <div class="cert-v2-row cert-v2-name">
                <span class="cert-v2-label">성명</span>
                <span class="cert-v2-value">홍길동</span>
            </div>

            <div class="cert-v2-row cert-v2-course">
                <span class="cert-v2-label">강좌명</span>
                <span class="cert-v2-value">AI 이미지 생성의 대세, 나노바나나로 초격자 디자인/기획 마스터하기 AI 이미지 생성의 대세, 나노바나나로 초격자 디자인/기획 마스터하기</span>
            </div>

            <div class="cert-v2-row cert-v2-start">
                <span class="cert-v2-label">시작일</span>
                <span class="cert-v2-value">2026.04.01</span>
            </div>

            <div class="cert-v2-row cert-v2-end">
                <span class="cert-v2-label">수료일</span>
                <span class="cert-v2-value">2026.04.30</span>
            </div>

            <p class="cert-v2-desc">위 사람은 해당 교육 과정을 성실히 수행하였기에<br>이 수료증을 수여합니다.</p>

            <div class="cert-v2-issue">2026년 05월 01일</div>

            <div class="cert-v2-issuer">
                <span class="cert-v2-org">DJ테크트리</span>
                <img class="cert-v2-stamp" src="../../../images/stamp.png" alt="직인">
            </div>

        </div>
    </div>

</body>
</html>
