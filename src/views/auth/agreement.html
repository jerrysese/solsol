<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../../../css/base.css">
</head>
<body class="auth-body">

    <span class="auth-breadcrumb">회원가입</span>

    <main class="auth-wrap">
        <div class="auth-card">

            <a href="#" class="auth-logo">
                <img src="../../images/monzo.png" alt="로고">
            </a>

            <h1 class="auth-title">회원가입</h1>

            <div class="agree-section">

                <label class="agree-all" for="agreeAll">
                    <input type="checkbox" id="agreeAll" class="agree-checkbox">
                    <span class="agree-all-text">전체동의</span>
                </label>

                <div class="agree-item">
                    <label class="agree-row-left" for="agree1">
                        <input type="checkbox" id="agree1" class="agree-checkbox">
                        <span class="agree-badge agree-badge--required">필수</span>
                        <span class="agree-label">이용약관</span>
                    </label>
                    <button class="agree-toggle" type="button" aria-label="이용약관 보기">
                        <svg width="11" height="6" viewBox="0 0 12.5 7.5" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M0.75 0.75L6.25 6.75L11.75 0.75" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>

                <div class="agree-item">
                    <label class="agree-row-left" for="agree2">
                        <input type="checkbox" id="agree2" class="agree-checkbox">
                        <span class="agree-badge agree-badge--required">필수</span>
                        <span class="agree-label">개인정보처리방침</span>
                    </label>
                    <button class="agree-toggle" type="button" aria-label="개인정보처리방침 보기">
                        <svg width="11" height="6" viewBox="0 0 12.5 7.5" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M0.75 0.75L6.25 6.75L11.75 0.75" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>

                <div class="agree-item agree-item--last">
                    <label class="agree-row-left" for="agree3">
                        <input type="checkbox" id="agree3" class="agree-checkbox">
                        <span class="agree-badge agree-badge--optional">선택</span>
                        <span class="agree-label">마케팅정보수신동의</span>
                    </label>
                    <button class="agree-toggle" type="button" aria-label="마케팅정보수신동의 보기">
                        <svg width="11" height="6" viewBox="0 0 12.5 7.5" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M0.75 0.75L6.25 6.75L11.75 0.75" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>

            </div>

            <button class="agree-submit-btn" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
                    <path d="M13.125 6.875H10C8.96625 6.875 8.125 7.71625 8.125 8.75V13.125C8.125 14.1587 8.96625 15 10 15H13.125C14.1587 15 15 14.1587 15 13.125V8.75C15 7.71625 14.1587 6.875 13.125 6.875ZM13.75 13.125C13.75 13.4694 13.47 13.75 13.125 13.75H10C9.655 13.75 9.375 13.4694 9.375 13.125V8.75C9.375 8.40563 9.655 8.125 10 8.125H13.125C13.47 8.125 13.75 8.40563 13.75 8.75V13.125ZM13.125 9.99813C13.125 10.3431 12.8456 10.6231 12.5 10.6231H10.625C10.2794 10.6231 10 10.3431 10 9.99813C10 9.65312 10.2794 9.37313 10.625 9.37313H12.5C12.8456 9.37313 13.125 9.65312 13.125 9.99813ZM13.125 11.875C13.125 12.22 12.8456 12.5 12.5 12.5H10.625C10.2794 12.5 10 12.22 10 11.875C10 11.53 10.2794 11.25 10.625 11.25H12.5C12.8456 11.25 13.125 11.53 13.125 11.875ZM5.625 7.5C7.69312 7.5 9.375 5.81812 9.375 3.75C9.375 1.68187 7.69312 0 5.625 0C3.55687 0 1.875 1.68187 1.875 3.75C1.875 5.81812 3.55687 7.5 5.625 7.5ZM5.625 1.25C7.00375 1.25 8.125 2.37125 8.125 3.75C8.125 5.12875 7.00375 6.25 5.625 6.25C4.24625 6.25 3.125 5.12875 3.125 3.75C3.125 2.37125 4.24625 1.25 5.625 1.25ZM6.875 9.375C6.875 9.72 6.59562 10 6.25 10H5.625C3.21312 10 1.25 11.9625 1.25 14.375C1.25 14.72 0.970625 15 0.625 15C0.279375 15 0 14.72 0 14.375C0 11.2738 2.52313 8.75 5.625 8.75H6.25C6.59562 8.75 6.875 9.03 6.875 9.375Z" fill="white"/>
                </svg>
                회원가입
            </button>

        </div>
    </main>

</body>
</html>
