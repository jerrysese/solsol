<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../../favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../../favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="../../../favicon/apple-touch-icon.png">
    <title>수료증 - 한글 세로형</title>
    <link rel="stylesheet" href="../../../../css/base.css">
</head>
<body>

    <div class="cert-stage">
        <div class="cert-v">

            <div class="cert-v-no">No. 2026-LMS-0001</div>

            <h1 class="cert-v-title">수료증</h1>

            <div class="cert-v-name">
                <span class="cert-v-label">성명</span>
                <span class="cert-v-div"></span>
                <span class="cert-v-value">홍길동</span>
            </div>

            <p class="cert-v-desc">위 사람은 해당 교육 과정을 성실히 수행하였기에 이 수료증을 수여합니다.</p>

            <p class="cert-v-course">AI 이미지 생성의 대세, 나노바나나로 초격자<br>디자인/기획 마스터하기</p>

            <div class="cert-v-dates">
                <div class="cert-v-datecol">
                    <span class="cert-v-date-label">시작일</span>
                    <span class="cert-v-line"></span>
                    <span class="cert-v-date-value">2026.04.01</span>
                </div>
                <div class="cert-v-datecol">
                    <span class="cert-v-date-label cert-v-date-label--end">수료일</span>
                    <span class="cert-v-line cert-v-line--end"></span>
                    <span class="cert-v-date-value cert-v-date-value--end">2026.04.30</span>
                </div>
            </div>

            <div class="cert-v-issuer">
                <span class="cert-v-org">DJ 테크트리</span>
                <img class="cert-v-stamp" src="../../../images/stamp.png" alt="직인">
            </div>

        </div>
    </div>

</body>
</html>
