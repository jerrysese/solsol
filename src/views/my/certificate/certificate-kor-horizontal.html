<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../../favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../../favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="../../../favicon/apple-touch-icon.png">
    <title>수료증 - 한글 가로형</title>
    <link rel="stylesheet" href="../../../../css/base.css">
</head>
<body>

    <div class="cert-stage">
        <div class="cert-h">

            <div class="cert-h-no">No. 2026-LMS-0001</div>

            <h1 class="cert-h-title">수료증</h1>

            <div class="cert-h-row cert-h-name">
                <span class="cert-h-label">성명</span>
                <span class="cert-h-div"></span>
                <span class="cert-h-value">홍길동</span>
            </div>

            <div class="cert-h-row cert-h-course">
                <span class="cert-h-label">과정명</span>
                <span class="cert-h-div"></span>
                <span class="cert-h-value">AI 이미지 생성의 대세, 나노바나나로 초격자 디자인/기획 마스터하기</span>
            </div>

            <p class="cert-h-desc">위 사람은 해당 교육 과정을 성실히 수행하였기에 이 수료증을 수여합니다.</p>

            <div class="cert-h-dates">
                <span class="cert-h-date-start">시작일 : 2026.04.01</span>
                <span class="cert-h-div"></span>
                <span class="cert-h-date-end">수료일 : 2026.04.30</span>
            </div>

            <div class="cert-h-issuer">
                <span class="cert-h-org"><b>DJ</b> 테크트리</span>
                <img class="cert-h-stamp" src="../../../images/stamp.png" alt="직인">
            </div>

        </div>
    </div>

</body>
</html>
